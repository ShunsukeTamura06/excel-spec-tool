# Path-split deployment example.
#
# Client URLs:
#   http://<server-ip>/      -> prod frontend
#   http://<server-ip>/api/  -> prod backend (127.0.0.1:8001)
#   http://<server-ip>/dev/     -> dev frontend
#   http://<server-ip>/dev/api/ -> dev backend (127.0.0.1:8002)
#
# Build frontend artifacts separately, preferably from separate Git worktrees:
#   prod: cd <prod-worktree>/frontend && NUXT_APP_BASE_URL=/ NUXT_PUBLIC_BACKEND_URL=/api pnpm generate
#   dev : cd <dev-worktree>/frontend  && NUXT_APP_BASE_URL=/dev/ NUXT_PUBLIC_BACKEND_URL=/dev/api pnpm generate

server {
    listen 80;
    server_name _;

    # Replace `/opt/excel-spec-tool/prod` and `/opt/excel-spec-tool/dev`
    # with the actual deployment directories.

    client_max_body_size 50m;

    # ----- dev API first, so /dev/api does not fall through to the dev SPA.
    location = /dev/api {
        return 308 /dev/api/;
    }

    location /dev/api/ {
        proxy_pass http://127.0.0.1:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ----- prod API.
    location = /api {
        return 308 /api/;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ----- dev frontend under /dev/.
    location = /dev {
        return 308 /dev/;
    }

    location /dev/ {
        alias /opt/excel-spec-tool/dev/frontend/.output/public/;
        try_files $uri $uri/ /dev/index.html;
    }

    # ----- prod frontend at root.
    location / {
        root /opt/excel-spec-tool/prod/frontend/.output/public;
        try_files $uri $uri/ /index.html;
    }
}
