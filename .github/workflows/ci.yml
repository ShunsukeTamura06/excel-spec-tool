name: CI

# main への push と main 向け PR で走らせる. concurrency で同一 ref の重複実行を打ち消し.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # 最小サポート (3.10) と現行 (3.12) の 2 点で確認.
        # pyproject.toml の classifiers と一致させる.
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      # 一番安いチェックを最初に. 1 秒で禁止文字列を grep して落とす.
      # ルール定義と意図は CLAUDE.md §11 (Invariants) を参照.
      - name: Consistency drift check
        run: uv run python scripts/check_drift.py

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Format check (ruff format --check)
        run: uv run ruff format --check

      - name: Type check (mypy --strict on core)
        run: uv run mypy core

      - name: Tests (pytest)
        run: uv run pytest -q

  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # pnpm@11 (package.json packageManager) は Node >= 22.13 が必須のため 20 は外す
        node-version: ['22']
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        # CI 用に lockfile 厳密. lockfile が壊れていれば落ちる.
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (SPA)
        # ssr=false 設定なので generate で静的書き出し相当の検証を兼ねる
        run: pnpm generate
